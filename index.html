<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BeMobile Alarm Issue & Actions Tracker</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BeMobile IT">
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0f0f0f; font-family: sans-serif; }
  .splash {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 24px;
  }
  .splash-icon {
    width: 84px; height: 84px; border-radius: 20px;
    background: #1a1a1a; border: 1px solid #333;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px; font-weight: 800; color: #fff; position: relative;
    margin-bottom: 16px;
  }
  .splash-icon::after {
    content: ''; position: absolute; top: 10px; right: 10px;
    width: 12px; height: 12px; border-radius: 6px; background: #cd040b;
  }
  .splash-title { color: #fff; font-size: 17px; font-weight: 700; margin-bottom: 4px; }
  .splash-sub { color: #666; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 22px; }
  .splash-dot { color: #cd040b; font-size: 11px; animation: pulse 1.2s ease infinite; margin-bottom: 26px; }
  @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 1; } }
  .launch-btn {
    background: #cd040b; color: #fff; text-decoration: none;
    font-weight: 700; font-size: 14px; padding: 12px 30px; border-radius: 8px;
  }
  .launch-note { color: #555; font-size: 10px; margin-top: 12px; max-width: 340px; line-height: 1.6; }
</style>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
</script>
</head>
<body>
<div class="splash">
  <div class="splash-icon">Be</div>
  <div class="splash-title">BeMobile</div>
  <div class="splash-sub">Alarm Issue &amp; Actions Tracker</div>
  <div class="splash-dot">&#9679; Launching</div>
  <a class="launch-btn" id="launchBtn" href="#">Launch Tracker</a>
  <div class="launch-note">If it does not open automatically, tap Launch Tracker. First launch may ask you to sign in with your bemobile.com account.</div>
</div>
<script>
  var GAS_URL = 'https://script.google.com/a/macros/bemobile.com/s/AKfycbyVBp629IgTUo5t7BtpHavnr8cvmfFXuOSp1Y9An2cVmrricIFMr988AUhAu2Jp0GRc/exec';
  document.getElementById('launchBtn').setAttribute('href', GAS_URL);
  // Top level navigation: script.google.com becomes first party, so auth
  // cookies work and Google sign in can display. No iframe, no X-Frame-Options.
  setTimeout(function() { window.location.replace(GAS_URL); }, 500);
</script>
</body>
</html>
