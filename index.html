<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>BeMobile Alarm Issue & Actions Tracker</title>
<!-- PWA: fullscreen on iOS -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BeMobile IT">
<!-- PWA: fullscreen on Android -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<!-- Manifest & Icons -->
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #0f0f0f;
    overflow: hidden;
    font-family: 'DM Sans', -apple-system, sans-serif;
    color: #e0e0e0;
  }

  /* ---- IFRAME (Android / Desktop) ---- */
  iframe {
    width: 100%; height: 100%;
    border: none;
    background: #0f0f0f;
  }

  /* ---- iOS LAUNCH SCREEN ---- */
  .ios-launch {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    height: 100dvh;
    padding: 32px 24px;
    text-align: center;
    background: #0f0f0f;
  }
  .ios-icon {
    width: 88px; height: 88px;
    border: 2px solid #cd040b;
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Sans', sans-serif;
    font-size: 36px; font-weight: 800;
    color: #cd040b;
    margin-bottom: 20px;
    box-shadow: 0 0 40px #cd040b15;
  }
  .ios-title {
    font-size: 24px; font-weight: 800;
    letter-spacing: 2px;
    color: #cd040b;
    margin-bottom: 4px;
  }
  .ios-subtitle {
    font-size: 12px;
    color: #555;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
  }
  .ios-btn {
    display: inline-block;
    padding: 14px 40px;
    background: #cd040b;
    color: #fff;
    border-radius: 10px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 700;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 20px rgba(205, 4, 11, 0.3);
  }
  .ios-btn:active {
    background: #a00308;
  }
  .ios-note {
    font-size: 11px;
    color: #333;
    margin-top: 24px;
    max-width: 260px;
    line-height: 1.5;
  }

  /* Safe area for notch/dynamic island */
  @supports (padding-top: env(safe-area-inset-top)) {
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
    .ios-launch {
      height: calc(100dvh - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    }
  }
</style>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(function(){});
  }
</script>
</head>
<body>
<script>
  var GAS_URL = 'https://script.google.com/a/macros/bemobile.com/s/AKfycbyVBp629IgTUo5t7BtpHavnr8cvmfFXuOSp1Y9An2cVmrricIFMr988AUhAu2Jp0GRc/exec';

  function isIOS() {
    return /iPhone|iPod|iPad/.test(navigator.userAgent)
      || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }

  if (isIOS()) {
    document.body.innerHTML =
      '<div class="ios-launch">' +
        '<div class="ios-icon">Be</div>' +
        '<div class="ios-title">BeMobile</div>' +
        '<div class="ios-subtitle">Alarm Issue & Actions Tracker</div>' +
        '<a class="ios-btn" href="' + GAS_URL + '">Launch Tracker</a>' +
        '<div class="ios-note">Opens in a browser view. Tap Done to return.</div>' +
      '</div>';
  } else {
    var iframe = document.createElement('iframe');
    iframe.src = GAS_URL;
    iframe.allow = 'clipboard-write';
    iframe.sandbox = 'allow-scripts allow-same-origin allow-popups allow-forms allow-popups-to-escape-sandbox';
    document.body.appendChild(iframe);

    // Handshake: Dashboard.html postMessages 'alarmdash-loaded' once it renders.
    // If that never arrives, Google served an interstitial (login/consent/dead
    // deployment) which refuses framing, or cookies are blocked. Show a way out.
    var appLoaded = false;
    window.addEventListener('message', function(ev) {
      if (ev.data === 'alarmdash-loaded') {
        appLoaded = true;
        var ov = document.getElementById('frameFallback');
        if (ov) ov.remove();
      }
    });
    setTimeout(function() {
      if (appLoaded) return;
      var ov = document.createElement('div');
      ov.id = 'frameFallback';
      ov.style.cssText = 'position:fixed;inset:0;background:#0f0f0f;color:#ccc;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;font-family:sans-serif;z-index:9999;';
      ov.innerHTML =
        '<div style="font-size:34px;font-weight:800;color:#fff;background:#1a1a1a;border:1px solid #333;border-radius:16px;width:72px;height:72px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;">Be</div>' +
        '<div style="font-size:16px;font-weight:700;color:#fff;margin-bottom:6px;">Tracker could not load in the app window</div>' +
        '<div style="font-size:12px;color:#888;max-width:420px;line-height:1.6;margin-bottom:18px;">Google is asking for a sign in or consent that cannot display here, or third party cookies are blocked for google.com. Open directly once, sign in, then relaunch this app.</div>' +
        '<a href="' + GAS_URL + '" target="_blank" rel="noopener" style="background:#cd040b;color:#fff;text-decoration:none;font-weight:700;font-size:14px;padding:12px 28px;border-radius:8px;margin-bottom:10px;">Open Directly</a>' +
        '<button onclick="location.reload()" style="background:transparent;color:#888;border:1px solid #333;font-size:12px;padding:8px 20px;border-radius:8px;cursor:pointer;">Retry</button>';
      document.body.appendChild(ov);
    }, 12000);
  }
</script>
</body>
</html>
